<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quick math — useddevice.ae</title>
<meta name="description" content="A small mental-math warmup. 60 seconds, one number at a time.">
<meta name="theme-color" content="#f5ede2">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='86'%3E%E2%9E%95%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg:        #f5ede2;   /* very light nescafe */
    --bg-soft:   #eee5d6;
    --line:      #2b2a28;
    --line-soft: #8a857b;
    --ink:       #1a1917;
    --ink-dim:   #5d594f;
    --accent:    #1a1917;
    --good:      #2d6a4f;
    --bad:       #8b2c2c;
    --mono:      'JetBrains Mono', 'SF Mono', 'IBM Plex Mono', Menlo, Consolas, 'Courier New', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.5;
  }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* Header */
  header {
    padding: 20px 28px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--line);
    font-size: 12px; letter-spacing: 0.4px; text-transform: uppercase;
  }
  header .brand { font-weight: 700; }
  header .sub { color: var(--ink-dim); }
  header a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--line-soft); }
  header a:hover { border-color: var(--ink); }

  /* Main game surface */
  main {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 28px;
    text-align: center;
  }

  .stats {
    display: flex; gap: 32px; margin-bottom: 48px;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--ink-dim);
  }
  .stats .pair { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stats .pair .n { font-size: 26px; color: var(--ink); font-weight: 500; letter-spacing: -0.5px; text-transform: none; }
  .stats .pair.hot .n { color: var(--good); }
  .stats .pair.cold .n { color: var(--bad); }

  .problem {
    font-size: clamp(48px, 12vw, 96px);
    font-weight: 500;
    letter-spacing: -2px;
    margin-bottom: 36px;
    min-height: 1.2em;
    transition: opacity 0.15s;
  }
  .problem.flash-good { color: var(--good); }
  .problem.flash-bad  { color: var(--bad); }

  .answer-row {
    display: flex; gap: 0; align-items: stretch;
    width: 100%; max-width: 440px;
    border: 1px solid var(--line);
    background: var(--bg);
    border-radius: 0;
  }
  .answer-row input {
    flex: 1;
    border: 0; background: transparent;
    font-family: inherit; font-size: 28px; font-weight: 500;
    padding: 16px 20px;
    color: var(--ink);
    outline: none;
    text-align: center;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
    /* Hide the default number-input spinners */
    -moz-appearance: textfield;
  }
  .answer-row input::-webkit-outer-spin-button,
  .answer-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .answer-row input::placeholder { color: var(--ink-dim); font-weight: 300; }
  .answer-row .enter-hint {
    display: flex; align-items: center; padding: 0 18px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--ink-dim);
    border-left: 1px solid var(--line-soft);
  }

  .controls {
    margin-top: 40px;
    display: flex; gap: 16px; justify-content: center;
  }
  button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit; font-size: 12px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  button:hover { background: var(--ink); color: var(--bg); }
  button.primary { background: var(--ink); color: var(--bg); }
  button.primary:hover { background: var(--bg); color: var(--ink); }

  /* Intro + over states */
  .intro, .over {
    text-align: center; max-width: 440px;
  }
  .intro h1 {
    margin: 0 0 8px 0; font-size: clamp(36px, 8vw, 64px); font-weight: 500; letter-spacing: -2px;
  }
  .intro p { margin: 0 0 32px 0; color: var(--ink-dim); font-size: 14px; line-height: 1.7; }
  .over .final {
    font-size: clamp(40px, 10vw, 72px); font-weight: 500; letter-spacing: -1.5px;
    margin-bottom: 4px;
  }
  .over .final-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-dim);
    margin-bottom: 32px;
  }
  .over .meta { color: var(--ink-dim); font-size: 13px; margin-bottom: 28px; }
  .over .meta b { color: var(--ink); font-weight: 500; }

  /* Footer */
  footer {
    padding: 20px 28px;
    border-top: 1px solid var(--line);
    font-size: 11px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  footer a { color: inherit; border-bottom: 1px solid var(--line-soft); text-decoration: none; }
  footer a:hover { border-color: var(--ink); }

  /* Timer progress — thin bar that drains as the clock runs */
  .timer-bar {
    position: fixed; top: 0; left: 0; height: 2px;
    background: var(--ink);
    width: 100%;
    transform-origin: left;
    transition: transform 1s linear, background 0.2s;
  }
  .timer-bar.warn { background: var(--bad); }

  /* Hide the helper section chrome on narrow screens */
  @media (max-width: 480px) {
    header { padding: 14px 18px; font-size: 11px; }
    main { padding: 20px 18px; }
    .stats { gap: 20px; margin-bottom: 28px; }
    .stats .pair .n { font-size: 22px; }
    .controls button { padding: 9px 14px; }
  }
</style>
</head>
<body>
  <div class="timer-bar" id="timer-bar"></div>

  <header>
    <div class="brand">useddevice.ae</div>
    <div class="sub"><a href="https://alasil.ae">alasil.ae</a> · <a href="https://bot.useddevice.ae/dashboard">bot</a></div>
  </header>

  <main id="stage"></main>

  <footer>
    <span>A small warmup — useddevice.ae</span>
    <span>best <span id="best-pill">—</span></span>
  </footer>

<script>
(() => {
  'use strict';

  const stage = document.getElementById('stage');
  const timerBar = document.getElementById('timer-bar');
  const bestPill = document.getElementById('best-pill');

  const STORAGE_KEY = 'ud_math_best_v1';
  const GAME_SECONDS = 60;

  const state = {
    score: 0,
    streak: 0,
    bestStreak: 0,
    mistakes: 0,
    solved: 0,
    timeLeft: GAME_SECONDS,
    running: false,
    current: null,
    tickHandle: null,
  };

  function getBest() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
  }
  function setBest(v) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); } catch {}
  }
  function updateBestPill() {
    const b = getBest();
    bestPill.textContent = b.score != null ? b.score : '—';
  }

  // Problem generator — gets harder the more you solve.
  function makeProblem(difficulty) {
    const d = Math.max(0, Math.min(6, difficulty | 0));
    const ops = ['+', '-', '×'];
    if (d >= 2) ops.push('×'); // weight multiplication more at harder tiers
    if (d >= 3) ops.push('÷');
    const op = ops[Math.floor(Math.random() * ops.length)];

    const rng = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    let a, b, answer, display;

    if (op === '+') {
      const ceil = [9, 19, 49, 99, 199, 499, 999][d] || 9;
      a = rng(1, ceil);
      b = rng(1, ceil);
      answer = a + b;
    } else if (op === '-') {
      const ceil = [9, 19, 49, 99, 199, 499, 999][d] || 9;
      a = rng(1, ceil);
      b = rng(1, a); // keep result non-negative
      answer = a - b;
    } else if (op === '×') {
      const ceilA = [9, 9, 12, 15, 20, 25, 30][d] || 9;
      const ceilB = [5, 9, 9, 12, 15, 15, 25][d] || 5;
      a = rng(2, ceilA);
      b = rng(2, ceilB);
      answer = a * b;
    } else {
      // ÷: pick an answer and a divisor, multiply to build the question
      const ceilAnswer = [5, 9, 12, 15, 20][Math.min(4, d - 3)] || 9;
      const ceilDivisor = [3, 5, 8, 10, 12][Math.min(4, d - 3)] || 5;
      const ans = rng(2, ceilAnswer);
      const div = rng(2, ceilDivisor);
      a = ans * div;
      b = div;
      answer = ans;
    }
    display = `${a} ${op} ${b}`;
    return { display, answer };
  }

  function renderIntro() {
    stage.innerHTML = `
      <div class="intro">
        <h1>quick math</h1>
        <p>60 seconds. One problem at a time. Type the number, press Enter.<br>No penalty for a wrong answer — just keep going.</p>
        <div class="controls">
          <button class="primary" id="start-btn">start</button>
        </div>
      </div>
    `;
    document.getElementById('start-btn').addEventListener('click', start);
    timerBar.style.transform = 'scaleX(1)';
    timerBar.classList.remove('warn');
  }

  function renderGame() {
    stage.innerHTML = `
      <div class="stats">
        <div class="pair"><span class="n" id="stat-score">0</span><span>score</span></div>
        <div class="pair ${state.streak >= 5 ? 'hot' : ''}" id="streak-pair"><span class="n" id="stat-streak">0</span><span>streak</span></div>
        <div class="pair"><span class="n" id="stat-time">${GAME_SECONDS}</span><span>seconds</span></div>
      </div>
      <div class="problem" id="problem">—</div>
      <form class="answer-row" id="answer-form" autocomplete="off">
        <input id="answer" type="number" inputmode="numeric" pattern="-?[0-9]*" placeholder="answer" autofocus />
        <span class="enter-hint">enter ↵</span>
      </form>
      <div class="controls">
        <button id="stop-btn">stop</button>
      </div>
    `;
    document.getElementById('answer-form').addEventListener('submit', submitAnswer);
    document.getElementById('stop-btn').addEventListener('click', endGame);
    document.getElementById('answer').focus();
  }

  function renderOver() {
    const best = getBest();
    const isNewBest = state.score > (best.score || 0);
    if (isNewBest) {
      setBest({ score: state.score, streak: state.bestStreak, ts: Date.now() });
      updateBestPill();
    }
    stage.innerHTML = `
      <div class="over">
        <div class="final">${state.score}</div>
        <div class="final-label">final score${isNewBest ? ' — new best' : ''}</div>
        <div class="meta">
          <b>${state.solved}</b> solved · <b>${state.bestStreak}</b> best streak · <b>${state.mistakes}</b> miss${state.mistakes === 1 ? '' : 'es'}
        </div>
        <div class="controls">
          <button class="primary" id="again-btn">play again</button>
        </div>
      </div>
    `;
    document.getElementById('again-btn').addEventListener('click', start);
  }

  function nextProblem() {
    const difficulty = Math.floor(state.solved / 4);
    state.current = makeProblem(difficulty);
    const el = document.getElementById('problem');
    if (el) { el.textContent = state.current.display; el.className = 'problem'; }
    const input = document.getElementById('answer');
    if (input) { input.value = ''; input.focus(); }
  }

  function submitAnswer(ev) {
    ev.preventDefault();
    const input = document.getElementById('answer');
    if (!input || !state.current) return;
    const raw = String(input.value || '').trim();
    if (raw === '') return;
    const guess = parseInt(raw, 10);
    if (!Number.isFinite(guess)) return;

    const problem = document.getElementById('problem');
    if (guess === state.current.answer) {
      state.score += 1 + Math.floor(state.streak / 3);
      state.streak += 1;
      state.solved += 1;
      state.bestStreak = Math.max(state.bestStreak, state.streak);
      document.getElementById('stat-score').textContent = state.score;
      document.getElementById('stat-streak').textContent = state.streak;
      const sp = document.getElementById('streak-pair');
      if (sp) sp.classList.toggle('hot', state.streak >= 5);
      if (problem) { problem.classList.add('flash-good'); setTimeout(() => problem.classList.remove('flash-good'), 100); }
      nextProblem();
    } else {
      state.streak = 0;
      state.mistakes += 1;
      document.getElementById('stat-streak').textContent = 0;
      const sp = document.getElementById('streak-pair');
      if (sp) sp.classList.remove('hot');
      if (problem) { problem.classList.add('flash-bad'); setTimeout(() => problem.classList.remove('flash-bad'), 150); }
      input.value = '';
      input.focus();
    }
  }

  function tick() {
    state.timeLeft -= 1;
    const timeEl = document.getElementById('stat-time');
    if (timeEl) timeEl.textContent = Math.max(0, state.timeLeft);
    const pct = Math.max(0, state.timeLeft / GAME_SECONDS);
    timerBar.style.transform = `scaleX(${pct})`;
    if (state.timeLeft <= 10) timerBar.classList.add('warn');
    if (state.timeLeft <= 0) endGame();
  }

  function start() {
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.mistakes = 0;
    state.solved = 0;
    state.timeLeft = GAME_SECONDS;
    state.running = true;
    timerBar.classList.remove('warn');
    timerBar.style.transform = 'scaleX(1)';
    renderGame();
    nextProblem();
    if (state.tickHandle) clearInterval(state.tickHandle);
    state.tickHandle = setInterval(tick, 1000);
  }

  function endGame() {
    if (!state.running) return;
    state.running = false;
    if (state.tickHandle) clearInterval(state.tickHandle);
    state.tickHandle = null;
    timerBar.style.transform = 'scaleX(0)';
    renderOver();
  }

  updateBestPill();
  renderIntro();
})();
</script>
</body>
</html>
